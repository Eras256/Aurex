# fly.toml configuration file for deploying the Aurex Bot on Fly.io
app = "bitcoin-arbitrage-bot"
# Frankfurt (fra): Binance / OKX / Bybit geo-block their public market-data WebSockets
# across ALL of North America — verified empirically: a Toronto (yyz) deployment could
# not open the Binance socket at all, only EU (fra) reaches all five venues. The closer
# Americas regions (Dallas, Toronto) trade lower operator latency for losing 3 feeds, so
# Frankfurt is the correct balance. The engine degrades gracefully if any single feed is
# unavailable (needs >=2 venues) and the HTTP server boots even if a venue is unreachable.
primary_region = "fra"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false # Keep simulator active to continually fetch and execute trades
  auto_start_machines = true
  min_machines_running = 1 # Keep one machine warm so long-lived WebSocket clients aren't dropped

  # Connection-based limits suit a small Node app holding open WS connections.
  [http_service.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

# HTTP health check against the Express /health endpoint (same internal port).
[[http_service.checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
  method = "get"
  path = "/health"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  # Cloud persistence: trade ledger, opportunities, balances and P&L are dual-written to
  # Supabase Postgres and rehydrated on boot, so they survive container restarts/redeploys
  # (the Fly filesystem is ephemeral). SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY are set as
  # encrypted Fly secrets (`flyctl secrets set`), never committed.
  PERSISTENCE_DRIVER = "supabase"
  BINANCE_WS_URL = "wss://stream.binance.com:9443/ws"
  BINANCE_REST_URL = "https://api.binance.com"
  KRAKEN_WS_URL = "wss://ws.kraken.com"
  KRAKEN_REST_URL = "https://api.kraken.com"
  # Additional live venue feeds (Coinbase USD book, OKX, Bybit) — all public, no auth.
  COINBASE_WS_URL = "wss://advanced-trade-ws.coinbase.com"
  OKX_WS_URL = "wss://ws.okx.com:8443/ws/v5/public"
  BYBIT_WS_URL = "wss://stream.bybit.com/v5/public/spot"
  # Engine tuning (see packages/config/src/engine.ts for rationale).
  ENGINE_MIN_NET_PROFIT_USD = "0.25"
  ENGINE_MAX_POSITION_BTC_PER_EXCHANGE = "5"
  ENGINE_LATENCY_SAFETY_BPS = "1"
  ENGINE_SLIPPAGE_SAFETY_BPS = "0"
  # Stablecoin (USD<->USDT) basis cost charged only on cross-quote legs (e.g. Coinbase
  # BTC-USD vs Binance BTC-USDT), so the Coinbase premium isn't booked as free profit.
  # 3 bps ≈ realistic USDC/USDT conversion: rejects marginal windows, lets genuine ones clear.
  ENGINE_USDT_USD_BASIS_BPS = "3"
  # CORS allowlist (comma-separated). Production Vercel frontend + local dev.
  ALLOWED_ORIGINS = "https://aurex-terminal.vercel.app,http://localhost:3000"
